<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="shared.css" />
  <title>ma3ady · feature graphic</title>
</head>
<body class="feature">
  <div class="glow"></div>
  <div class="mark-wrap">
    <div class="mark">
      <!--
        Clock-3 mark mirrors assets/branding/mark.svg's stylized
        clock face. White stroke on the teal gradient body.
      -->
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="88" fill="none" stroke="#FFFFFF" stroke-width="14"/>
        <!-- tick marks at 12/3/6/9 -->
        <rect x="96" y="14" width="8" height="22" rx="4" fill="#FFFFFF"/>
        <rect x="164" y="96" width="22" height="8" rx="4" fill="#FFFFFF"/>
        <rect x="96" y="164" width="8" height="22" rx="4" fill="#FFFFFF"/>
        <rect x="14" y="96" width="22" height="8" rx="4" fill="#FFFFFF"/>
        <!-- hour hand pointing to 3 (right) -->
        <rect x="100" y="92" width="58" height="16" rx="8" fill="#FFFFFF"/>
        <!-- minute hand pointing to 12 (up) -->
        <rect x="92" y="40" width="16" height="68" rx="8" fill="#FFFFFF"/>
        <!-- pivot -->
        <circle cx="100" cy="100" r="10" fill="#FFFFFF"/>
      </svg>
    </div>
    <div class="copy">
      <span class="word">ma3ady</span>
      <span class="tag">Booking, simplified.</span>
    </div>
  </div>
</body>
</html>
