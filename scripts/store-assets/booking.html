<!DOCTYPE html>
<html lang="LOCALE" dir="DIR">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="shared.css" />
  <title>ma3ady · Book</title>
</head>
<body>
  <div class="banner">
    <span class="wordmark">ma3ady</span>
    <span class="caption" data-i18n="caption">Customers book in two taps</span>
  </div>

  <div class="status-bar">
    <span class="mono">9:41</span>
    <span class="right">
      <svg viewBox="0 0 24 24"><path d="M4 12h16v2H4zm0-4h16v2H4zm0 8h10v2H4z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M2 8h2v8H2zm4-3h2v14H6zm4 5h2v9h-2zm4-7h2v16h-2zm4 4h2v12h-2z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M17 6H7c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-1 8H8v-1h8v1zm0-3H8v-1h8v1zm0-3H8V7h8v1z"/></svg>
    </span>
  </div>

  <main class="screen bg-salon">
    <section class="tenant-card">
      <div class="tenant-avatar">
        <!-- scissors icon (lucide-style two-loop pivot) -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="3"/>
          <circle cx="6" cy="18" r="3"/>
          <line x1="20" y1="4" x2="8.12" y2="15.88"/>
          <line x1="14.47" y1="14.48" x2="20" y2="20"/>
          <line x1="8.12" y1="8.12" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="tenant-meta">
        <span class="name" data-i18n="tenant">Cleo's Cut</span>
        <span class="sub" data-i18n="tenantSub">Salon · Cairo · Zamalek</span>
      </div>
    </section>

    <section class="service-block">
      <span class="title" data-i18n="svc">Signature Cut</span>
      <span class="duration" data-i18n="dur">45 min</span>
    </section>

    <section class="day-strip">
      <div class="day"><span class="dow">MON</span><span class="dom">18</span></div>
      <div class="day is-selected"><span class="dow">TUE</span><span class="dom">19</span><span class="dot"></span></div>
      <div class="day has-some"><span class="dow">WED</span><span class="dom">20</span><span class="dot"></span></div>
      <div class="day"><span class="dow">THU</span><span class="dom">21</span></div>
      <div class="day"><span class="dow">FRI</span><span class="dom">22</span><span class="dot"></span></div>
      <div class="day"><span class="dow">SAT</span><span class="dom">23</span><span class="dot"></span></div>
    </section>

    <section class="slot-bucket">
      <div class="bucket-head">
        <span class="icon morning-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </span>
        <span class="label" data-i18n="morning">Morning</span>
        <span class="count mono">4 / 4</span>
      </div>
      <div class="slot-grid">
        <span class="slot slot-morning mono">09:00</span>
        <span class="slot slot-morning mono">09:45</span>
        <span class="slot slot-morning mono">10:30</span>
        <span class="slot slot-morning mono">11:15</span>
      </div>
    </section>

    <section class="slot-bucket">
      <div class="bucket-head">
        <span class="icon afternoon-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5.6 5.6L4.2 4.2M19.8 19.8l-1.4-1.4M5.6 18.4l-1.4 1.4M19.8 4.2l-1.4 1.4" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </span>
        <span class="label" data-i18n="afternoon">Afternoon</span>
        <span class="count mono">3 / 4</span>
      </div>
      <div class="slot-grid">
        <span class="slot slot-afternoon mono">12:30</span>
        <span class="slot slot-afternoon mono">14:00</span>
        <span class="slot slot-afternoon mono">15:30</span>
      </div>
    </section>

    <section class="slot-bucket">
      <div class="bucket-head">
        <span class="icon evening-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </span>
        <span class="label" data-i18n="evening">Evening</span>
        <span class="count mono">1 / 2</span>
      </div>
      <div class="slot-grid">
        <span class="slot slot-evening mono">17:45</span>
      </div>
    </section>
  </main>

  <div class="fab">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4.5 13.5h6L11 22l8.5-11.5h-6L13 2z"/></svg>
  </div>

  <div class="gesture-bar"></div>

  <script>
    const i18n = {
      en: {
        caption: 'Customers book in two taps',
        tenant: "Cleo's Cut", tenantSub: 'Salon · Cairo · Zamalek',
        svc: 'Signature Cut', dur: '45 min',
        morning: 'Morning', afternoon: 'Afternoon', evening: 'Evening',
      },
      ar: {
        caption: 'العملاء يحجزون بنقرتين',
        tenant: 'صالون كليو', tenantSub: 'صالون · القاهرة · الزمالك',
        svc: 'قصة كليو المميزة', dur: '45 دقيقة',
        morning: 'الصباح', afternoon: 'الظهر', evening: 'المساء',
      },
    };
    const lang = document.documentElement.lang;
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      const k = el.dataset.i18n;
      if (i18n[lang] && i18n[lang][k]) el.textContent = i18n[lang][k];
    });
    const dowMap = {
      ar: { MON: 'إث', TUE: 'ثل', WED: 'أر', THU: 'خم', FRI: 'جم', SAT: 'سب' },
    };
    if (dowMap[lang]) {
      document.querySelectorAll('.day .dow').forEach((el) => {
        const k = el.textContent.trim();
        if (dowMap[lang][k]) el.textContent = dowMap[lang][k];
      });
    }
  </script>
</body>
</html>
