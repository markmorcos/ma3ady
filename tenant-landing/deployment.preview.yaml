version: 0.4.7

namespace: ma3ady-preview
project: ma3ady

services:
  - name: tenant-landing
    context: tenant-landing
    image: ghcr.io/markmorcos/ma3ady-tenant-landing
    port: 8080

    env:
      - name: SUPABASE_URL
        valueFrom:
          secretKeyRef:
            name: supabase-url
            key: SUPABASE_URL
      - name: SUPABASE_ANON_KEY
        valueFrom:
          secretKeyRef:
            name: supabase-anon-key
            key: SUPABASE_ANON_KEY
      - name: SUPABASE_SERVICE_ROLE_KEY
        valueFrom:
          secretKeyRef:
            name: supabase-service-role-key
            key: SUPABASE_SERVICE_ROLE_KEY
      - name: APEX_HOST
        value: preview.ma3ady.com
      - name: NODE_ENV
        value: production

    ingress:
      host: preview.ma3ady.com
      path: /
      pathType: Prefix
