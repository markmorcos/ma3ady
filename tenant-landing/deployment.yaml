version: 0.4.7

namespace: ma3ady
project: ma3ady-tenant-landing

services:
  - name: tenant-landing
    context: tenant-landing
    image: ghcr.io/markmorcos/ma3ady-tenant-landing
    port: 8080

    env:
      - name: SUPABASE_URL
        value: $SUPABASE_URL
      - name: SUPABASE_ANON_KEY
        value: $SUPABASE_ANON_KEY
      - name: SUPABASE_SERVICE_ROLE_KEY
        valueFromSecret: supabase-service-role-key
      - name: APEX_HOST
        value: ma3ady.com
      - name: NODE_ENV
        value: production

    # The chart's ingress template only takes a single `host:` and issues a
    # non-wildcard TLS cert via HTTP-01. So this Deployment serves the apex
    # (ma3ady.com) — which is the marketing surface plus the legal pages,
    # /robots.txt, /sitemap.xml. The booking surface for tenant subdomains
    # (<slug>.ma3ady.com) requires a wildcard TLS cert, which needs a
    # cert-manager DNS-01 issuer set up separately; that lands when the
    # first tenant goes live. Until then `slugFromHost(host)` returns null
    # for ma3ady.com and the app renders <MarketingHome>.
    ingress:
      host: ma3ady.com
      path: /
      pathType: Prefix
