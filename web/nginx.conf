# nginx config for app.ma3ady.com — serves the static Expo web export
# with the SPA fallback so client-side routes resolve on hard refresh.

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Apple Universal Links file — must be served without a file extension and
  # with `application/json` so iOS will accept it.
  location = /.well-known/apple-app-site-association {
    default_type application/json;
    try_files $uri =404;
  }

  # Android App Links file.
  location = /.well-known/assetlinks.json {
    default_type application/json;
    try_files $uri =404;
  }

  # Long-lived caching for hashed static assets.
  location /_expo/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback — anything that's not a real file lands on index.html.
  location / {
    try_files $uri $uri/ /index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP is intentionally permissive on the SPA side; the Supabase domain
    # is required for the anon-key XHR + realtime websocket.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none';" always;
  }

  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
