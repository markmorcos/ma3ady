# OpenSpec configuration for Ma3ady
# Single source of truth for project decisions lives in openspec/project.md.
# Capability specs in openspec/specs/<capability>/spec.md.
# Pending proposals in openspec/changes/<slug>/.

schema: spec-driven

# Capabilities planned for v1. Each will materialize a spec.md under openspec/specs/
# as the corresponding change in openspec/changes/ is accepted.
capabilities:
  - app-shell
  - branding
  - design-system
  - i18n
  - dev-tooling
  - auth
  - tenancy
  - availability
  - services
  - appointments
  - public-booking
  - admin
  - notifications
  - audit-log
  - observability
  - marketing-site
  - deployment
  - compliance

# Deferred capabilities (will land via separate change folders when scheduled)
deferred_capabilities:
  - storage-and-uploads
  - staff-resources
  - paid-bookings
  - native-push
  - native-google-signin
  - web-booking-surface
  - additional-locales
