name: Build Android APK (local, no EAS)
on:
  workflow_dispatch:
    inputs:
      profile:
        description: Env profile (mirrors eas.json)
        required: true
        default: preview
        type: choice
        options: [development, preview]
jobs:
  build:
    uses: markmorcos/build-tooling/.github/workflows/build-android.yml@v1
    permissions:
      contents: write
    with:
      profile: ${{ inputs.profile }}
      app-slug: ma3ady
      enable-dev-tools: ${{ inputs.profile == 'development' }}
      auth-redirect-uri: ma3ady://auth/callback
      default-locale: en
      preflight-script: scripts/assert-real-dispatchers.js
      extra-env: |
        EXPO_PUBLIC_EMAIL_DISPATCHER=real
        EXPO_PUBLIC_WHATSAPP_DISPATCHER=real
        EXPO_PUBLIC_PUSH_DISPATCHER=real
        EXPO_PUBLIC_CLIENT_ERROR_SAMPLE_RATE=1.0
    secrets:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
