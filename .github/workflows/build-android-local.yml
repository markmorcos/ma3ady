name: Build Android APK (local, no EAS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Env profile (mirrors eas.json)
        required: true
        default: preview
        type: choice
        options: [development, preview]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      EXPO_PUBLIC_SHOW_DEV_TOOLS: ${{ inputs.profile == 'development' && '1' || '0' }}
      EXPO_PUBLIC_EMAIL_DISPATCHER: real
      EXPO_PUBLIC_WHATSAPP_DISPATCHER: real
      EXPO_PUBLIC_PUSH_DISPATCHER: real
      EXPO_PUBLIC_CLIENT_ERROR_SAMPLE_RATE: '1.0'
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_AUTH_REDIRECT_URI: ${{ vars.EXPO_PUBLIC_AUTH_REDIRECT_URI || 'ma3ady://auth/callback' }}
      EXPO_PUBLIC_DEFAULT_LOCALE: ${{ vars.EXPO_PUBLIC_DEFAULT_LOCALE || 'en' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - run: pnpm install --frozen-lockfile

      - name: Assert required EXPO_PUBLIC_* secrets present
        run: |
          missing=""
          [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] && missing="$missing EXPO_PUBLIC_SUPABASE_URL"
          [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ] && missing="$missing EXPO_PUBLIC_SUPABASE_ANON_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secrets:$missing. Add them under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Assert real dispatchers
        run: node scripts/assert-real-dispatchers.js

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install --clean

      - name: Raise Gradle/worker JVM heap (avoid Metaspace OOM on CMake configure)
        run: |
          props=android/gradle.properties
          if [ -f "$props" ]; then
            sed -i '/^org\.gradle\.jvmargs=/d' "$props"
          fi
          {
            echo ''
            echo '# Overridden by .github/workflows/build-android-local.yml'
            echo 'org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8'
          } >> "$props"
          tail -n 5 "$props"

      - name: Gradle assembleRelease
        working-directory: android
        env:
          GRADLE_OPTS: -Xmx5g -XX:MaxMetaspaceSize=2g
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ma3ady-${{ inputs.profile }}-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish GitHub Release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="local-build-${{ inputs.profile }}-$(date -u +%Y%m%d-%H%M%S)"
          gh release create "$tag" \
            android/app/build/outputs/apk/release/app-release.apk \
            --title "Local build ($tag)" \
            --notes "Sideload APK built on GH Actions (debug-signed, real dispatchers). Commit ${{ github.sha }}."
