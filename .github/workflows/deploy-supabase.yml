name: Deploy Supabase backend

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'Makefile'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase-${{ github.ref }}
  cancel-in-progress: false

# Both `SUPABASE_DB_PASSWORD` (Secret) and `SUPABASE_PROJECT_REF`
# (Variable — refs aren't sensitive, they're in the dashboard URL) are
# scoped to each GitHub Environment, so the same unsuffixed name
# resolves to the correct value per job. Repo-level secrets remain
# `SUPABASE_ACCESS_TOKEN` (single PAT spans both projects).

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment: preview
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Push migrations
        run: make deploy-migrations PROJECT=preview ASSUME_YES=1
      - name: Deploy functions
        run: make deploy-functions PROJECT=preview ASSUME_YES=1

  deploy-production:
    needs: deploy-preview
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Push migrations
        run: make deploy-migrations PROJECT=prod ASSUME_YES=1
      - name: Deploy functions
        run: make deploy-functions PROJECT=prod ASSUME_YES=1
