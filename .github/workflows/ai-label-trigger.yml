name: AI label triggers Claude

# When an issue gets the `ai` label, post a `@claude` mention so the
# Claude Code on the Web GitHub App spawns a session against it.
# Lets you drive the agent from labels (or from a Projects board filter)
# instead of typing the mention by hand every time.
#
# To re-trigger Claude on the same issue, remove the label and re-add
# it — each re-add fires the workflow again. (No idempotency check on
# purpose: blocking re-triggers also blocks retries when a previous
# session failed or you want a fresh attempt.)

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  mention-claude:
    if: github.event.label.name == 'ai'
    runs-on: ubuntu-latest
    steps:
      - name: Comment @claude on the issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "@claude please pick this up — task is in the issue body above. Design + implement, open a PR when ready."
