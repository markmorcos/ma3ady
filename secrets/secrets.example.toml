# Master secrets schema for ma3ady.
# Populate `secrets/secrets.local.toml` with the same shape; that file is
# gitignored. `SUPABASE_PROJECT_REF=<ref> make secrets-sync ENV=preview`
# fans this out to Supabase + EAS.
#
# Empty strings ("") = you fill in. Pre-filled values are well-known
# defaults / constants and can be left as-is unless you have reason to
# change them.
#
# GitHub Actions secrets are managed manually via the GitHub UI and are
# NOT synced from this file.
#   Repo-level: DEPLOYMENT_TOKEN, INFRASTRUCTURE_PAT, SUPABASE_ACCESS_TOKEN,
#               EXPO_TOKEN
#   Per-env (preview, production): SUPABASE_DB_PASSWORD, SUPABASE_PROJECT_REF

schema_version = "1"

# ---------------------------------------------------------------------------
# Supabase Edge Function runtime secrets
# Written via `supabase secrets set NAME=VALUE --project-ref <ref>`.
# `make secrets-sync-supabase ENV=preview|production` fans these out.
# ---------------------------------------------------------------------------

[supabase.preview]
SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID = ""
SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET = ""
RESEND_API_KEY = ""
RESEND_FROM = "Ma3ady <hello@ma3ady.com>"
WHATSAPP_ACCESS_TOKEN = ""
WHATSAPP_PHONE_NUMBER_ID = ""
WHATSAPP_TEMPLATE_NAME = "event_notification"
EMAIL_DISPATCHER = "mock"
WHATSAPP_DISPATCHER = "mock"
PUSH_DISPATCHER = "mock"

[supabase.production]
SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID = ""
SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET = ""
RESEND_API_KEY = ""
RESEND_FROM = "Ma3ady <hello@ma3ady.com>"
WHATSAPP_ACCESS_TOKEN = ""
WHATSAPP_PHONE_NUMBER_ID = ""
WHATSAPP_TEMPLATE_NAME = "event_notification"
# Keep dispatchers "mock" until docs/dns-setup.md gate passes:
# `make dns-check` exits zero AND Resend dashboard shows the domain Verified.
# Flip to "real" only after the deliverability test succeeds.
EMAIL_DISPATCHER = "mock"
WHATSAPP_DISPATCHER = "mock"
PUSH_DISPATCHER = "mock"

# ---------------------------------------------------------------------------
# EAS project env vars baked into mobile builds.
# Written via `eas env:create --environment preview|production`.
# Non-secret defaults (SHOW_DEV_TOOLS, CLIENT_ERROR_SAMPLE_RATE) live in
# eas.json — only the values that change per project / per env land here.
# ---------------------------------------------------------------------------

[eas.preview]
EXPO_PUBLIC_SUPABASE_URL = ""
EXPO_PUBLIC_SUPABASE_ANON_KEY = ""
EXPO_PUBLIC_AUTH_REDIRECT_URI = "ma3ady://auth/callback"
EXPO_PUBLIC_DEFAULT_LOCALE = "en"

[eas.production]
EXPO_PUBLIC_SUPABASE_URL = ""
EXPO_PUBLIC_SUPABASE_ANON_KEY = ""
EXPO_PUBLIC_AUTH_REDIRECT_URI = "ma3ady://auth/callback"
EXPO_PUBLIC_DEFAULT_LOCALE = "en"

# ---------------------------------------------------------------------------
# k8s Secrets (per namespace) consumed by the tenant-landing pod.
# Apply via `./scripts/k8s/apply-tenant-landing-secrets.sh preview|production`.
# This file is NOT a sync source for k8s — the script prompts interactively.
# Listed here so secret-rotation reviews remember to update both stores.
# ---------------------------------------------------------------------------

[k8s.preview]
# Namespace: ma3ady-preview. Secret keys: `value`.
SUPABASE_URL = ""                 # secret name: supabase-url
SUPABASE_ANON_KEY = ""            # secret name: supabase-anon-key
SUPABASE_SERVICE_ROLE_KEY = ""    # secret name: supabase-service-role-key

[k8s.production]
# Namespace: ma3ady.
SUPABASE_URL = ""
SUPABASE_ANON_KEY = ""
SUPABASE_SERVICE_ROLE_KEY = ""

# ---------------------------------------------------------------------------
# DNS — not synced by these scripts; verified by `make dns-check`.
# Listed for rotation reviews.
# ---------------------------------------------------------------------------

[dns.production]
spf = 'v=spf1 include:_spf.resend.com -all'
dmarc = 'v=DMARC1; p=quarantine; rua=mailto:dmarc@ma3ady.com; pct=100'
# DKIM key value lives only in Cloudflare and Resend; not committed.
